<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="50%" stop-color="#BC8CFF"/>
      <stop offset="100%" stop-color="#F778BA"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#79C0FF"/>
      <stop offset="100%" stop-color="#58A6FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#58A6FF" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/><line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="160" y1="0" x2="160" y2="260"/><line x1="320" y1="0" x2="320" y2="260"/>
    <line x1="480" y1="0" x2="480" y2="260"/><line x1="640" y1="0" x2="640" y2="260"/>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="4" rx="2" fill="url(#accent)"/>

  <!-- RX Glyph / Terminal prompt -->
  <g filter="url(#glow)" transform="translate(60, 70)">
    <!-- Terminal window -->
    <rect x="0" y="0" width="280" height="140" rx="10" fill="#0D1117" stroke="#30363D" stroke-width="1.5"/>
    <!-- Title bar dots -->
    <circle cx="22" cy="18" r="5" fill="#FF5F57"/>
    <circle cx="40" cy="18" r="5" fill="#FEBC2E"/>
    <circle cx="58" cy="18" r="5" fill="#28C840"/>
    <!-- Terminal content -->
    <text x="20" y="52" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="16" fill="#8B949E">$</text>
    <text x="38" y="52" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="16" fill="#58A6FF">rx</text>
    <text x="20" y="78" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#8B949E">◉ repo</text>
    <text x="100" y="78" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#58A6FF">= ~/.dotfiles</text>
    <text x="20" y="98" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#8B949E">◉ hostname</text>
    <text x="120" y="98" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#58A6FF">= mymachine</text>
    <text x="20" y="118" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#3FB950">✓ NixOS rebuilt!</text>
    <!-- Blinking cursor -->
    <rect x="208" y="107" width="8" height="14" fill="#58A6FF" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- RX Title -->
  <g filter="url(#shadow)" transform="translate(400, 65)">
    <text x="0" y="0" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="72" font-weight="900" fill="url(#glyph)" letter-spacing="-3">RX</text>
    <text x="0" y="36" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="18" fill="#8B949E" letter-spacing="4">NIXOS UPDATE CLI</text>
  </g>

  <!-- Feature badges -->
  <g transform="translate(400, 140)">
    <!-- 100% Coverage badge -->
    <rect x="0" y="0" width="150" height="30" rx="15" fill="#0D2818" stroke="#238636" stroke-width="1"/>
    <circle cx="18" cy="15" r="5" fill="#3FB950"/>
    <text x="30" y="20" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="600" fill="#3FB950">100% Coverage</text>

    <!-- Zero deps badge -->
    <rect x="165" y="0" width="140" height="30" rx="15" fill="#0D1A2E" stroke="#1F6FEB" stroke-width="1"/>
    <text x="183" y="20" font-family="'Inter', monospace" font-size="13" font-weight="600" fill="#58A6FF">⚡ Zero Deps</text>

    <!-- Rust badge -->
    <rect x="320" y="0" width="100" height="30" rx="15" fill="#2A1A0D" stroke="#DA7B2A" stroke-width="1"/>
    <text x="338" y="20" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="600" fill="#F0983A">🦀 Rust</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="256" width="800" height="4" rx="2" fill="url(#accent)"/>
</svg>
